# ================= COLORS =================
[colors.bright]
black = "#3b4261"
blue = "#8bbdf7"
cyan = "#8ddfff"
green = "#b4f1a7"
magenta = "#ccaef7"
red = "#ff7b8f"
white = "#c0caf5"
yellow = "#ffc98e"

[colors.cursor]
cursor = "#c0caf5"
text = "#a9b1d6"

[colors.normal]
black = "#2e3440"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
red = "#f7768e"
white = "#a9b1d6"
yellow = "#e0af68"

[colors.primary]
background = "#1e2030"
foreground = "#a9b1d6"

# ================= FONT =================
[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Light" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Light Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 12.0
